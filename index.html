<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Flow - Ing. Saúl Briceño</title>
    <link rel="manifest" href="manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    
    <style>
        body { background: #09090b; color: #f4f4f5; min-height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .glass-card { background: linear-gradient(145deg, rgba(30,41,59,0.4) 0%, rgba(15,23,42,0.4) 100%); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); }
        .tab-active { border-bottom: 2px solid #60a5fa; color: #60a5fa; font-weight: 600; }
        .timer-active { color: #fcd34d; text-shadow: 0 0 15px rgba(252, 211, 77, 0.4); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; cursor: pointer; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <div id="loginScreen" class="max-w-md mx-auto w-full flex-grow flex flex-col justify-center animate__animated animate__fadeIn">
        <div class="text-center mb-10">
            <img src="icon.png" alt="Focus Flow Logo" class="w-24 h-24 mx-auto mb-4 rounded-3xl shadow-lg shadow-blue-500/20">
            <h1 class="text-5xl font-black tracking-tight bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent drop-shadow-sm mb-3">Focus Flow</h1>
            <p class="text-gray-400 text-sm">Ingresa tus datos o crea una cuenta</p>
        </div>

        <div class="glass p-8 rounded-3xl shadow-2xl">
            <input id="loginUser" type="text" placeholder="Usuario" class="w-full bg-[#12121a] border border-gray-700 rounded-xl p-4 outline-none mb-4 text-white focus:border-blue-500 transition-colors">
            <input id="loginPass" type="password" placeholder="Contraseña" class="w-full bg-[#12121a] border border-gray-700 rounded-xl p-4 outline-none mb-4 text-white focus:border-blue-500 transition-colors">
            
            <div class="flex items-center gap-3 mb-8">
                <input type="checkbox" id="keepLogged" class="w-4 h-4 accent-blue-500 bg-gray-700 border-gray-600 rounded">
                <label for="keepLogged" class="text-sm text-gray-300">Mantener sesión iniciada</label>
            </div>

            <div class="flex flex-col gap-4">
                <button onclick="iniciarSesion()" class="w-full py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold tracking-widest shadow-lg shadow-blue-900/20 transition-all transform active:scale-95">INICIAR SESIÓN</button>
                <button onclick="crearCuenta()" class="w-full py-3 rounded-2xl bg-transparent border border-blue-600/50 text-blue-400 hover:bg-blue-600/10 font-bold tracking-widest transition-all transform active:scale-95 text-sm">CREAR NUEVA CUENTA</button>
            </div>
        </div>
    </div>

    <div id="mainApp" class="max-w-md mx-auto w-full flex-grow hidden animate__animated animate__fadeIn">
        <header class="mb-6 mt-2 text-center relative">
            <h1 class="text-4xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 bg-clip-text text-transparent drop-shadow-sm">Focus Flow</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mt-1">Productividad Inteligente</p>
        </header>

        <div id="tabContainer" class="flex overflow-x-auto no-scrollbar mb-6 border-b border-gray-800/50 px-2 gap-4 whitespace-nowrap pb-1">
            </div>

        <div class="glass p-6 rounded-3xl mb-8 shadow-2xl">
            <input id="taskInput" type="text" placeholder="Nueva tarea..." class="w-full bg-transparent border-b border-gray-700 p-2 outline-none mb-6 text-xl text-white placeholder-gray-600 focus:border-blue-500 transition-colors">
            
            <div class="flex flex-wrap items-end justify-between gap-4 mb-6">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-semibold mb-1 tracking-wider">TIEMPO (MIN)</span>
                    <input id="taskTime" type="number" min="1" max="120" value="25" class="bg-black/40 rounded-xl px-3 py-2 w-20 text-center text-blue-400 font-mono font-bold border border-gray-800 outline-none focus:border-blue-500">
                </div>
                
                <div class="flex flex-col flex-grow">
                    <span class="text-[10px] text-gray-500 font-semibold mb-1 tracking-wider">FECHA (OPCIONAL)</span>
                    <input id="taskDate" type="date" class="bg-black/40 rounded-xl px-3 py-2 w-full text-gray-300 text-sm border border-gray-800 outline-none focus:border-blue-500">
                </div>
            </div>

            <div class="flex flex-col mb-6">
                <span class="text-[10px] text-gray-500 font-semibold mb-2 tracking-wider">APARTADO</span>
                <div id="contextButtons" class="flex flex-wrap gap-2">
                    </div>
            </div>

            <button onclick="addTask()" class="w-full py-3.5 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-sm tracking-widest shadow-lg shadow-blue-900/20 transition-all transform active:scale-95">AGREGAR TAREA</button>
        </div>

        <div id="taskList" class="space-y-4 pb-10"></div>
    </div>

    <footer class="mt-auto py-6 text-center opacity-60 hover:opacity-100 transition-opacity">
        <div class="inline-flex items-center justify-center gap-2">
            <div class="h-px w-8 bg-gradient-to-r from-transparent to-gray-500"></div>
            <span class="text-xs font-medium tracking-widest text-gray-400">DESIGNED BY <span class="text-gray-200">ING. SAÚL BRICEÑO</span></span>
            <div class="h-px w-8 bg-gradient-to-l from-transparent to-gray-500"></div>
        </div>
    </footer>

    <script>
        // --- 1. LÓGICA DE LOGIN ---
        
        // Cargamos los usuarios guardados en el teléfono (si no hay, creamos una lista vacía)
        let usuariosDB = JSON.parse(localStorage.getItem('focus_usuarios')) || {};

        function crearCuenta() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if(user === '' || pass === '') {
                alert('Por favor, llena ambos campos para crear tu cuenta.');
                return;
            }

            if(usuariosDB[user]) {
                alert('Ese usuario ya existe. Si es tuyo, intenta iniciar sesión.');
                return;
            }

            // Guardamos el usuario nuevo
            usuariosDB[user] = pass;
            localStorage.setItem('focus_usuarios', JSON.stringify(usuariosDB));
            alert('¡Cuenta creada con éxito! Ahora puedes iniciar sesión.');
            
            // Limpiamos la contraseña por seguridad
            document.getElementById('loginPass').value = '';
        }

        function iniciarSesion() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if(user === '' || pass === '') {
                alert('Por favor, ingresa tu usuario y contraseña.');
                return;
            }

            // Comprobamos si el usuario existe en nuestra "base de datos"
            if(!usuariosDB[user]) {
                alert('El usuario no existe. Por favor, crea una cuenta primero.');
                return;
            }

            // Comprobamos que la contraseña sea correcta
            if(usuariosDB[user] !== pass) {
                alert('Contraseña incorrecta.');
                return;
            }
            
            // Si todo está bien, lo dejamos entrar
            entrarAplicacion();
        }

        function entrarAplicacion() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            
            if(document.getElementById('keepLogged').checked) {
                localStorage.setItem('focus_user_logged', 'true');
            }
            
            renderTabs();
            renderContextButtons();
            renderTasks();
        }

        // Si ya tenía la sesión guardada de antes
        if(localStorage.getItem('focus_user_logged') === 'true') {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
        }

        // --- 2. LÓGICA DE TAREAS ---
        let tasks = JSON.parse(localStorage.getItem('tasks_v6')) || [];
        let contexts = JSON.parse(localStorage.getItem('contexts_v1')) || [
            { id: 'hogar', name: 'Hogar', icon: '🏠' },
            { id: 'trabajo', name: 'Trabajo', icon: '💼' }
        ];
        let currentFilter = 'Todos';
        let selectedContext = contexts[0].id;
        let interval;

        function renderTabs() {
            const container = document.getElementById('tabContainer');
            container.innerHTML = `<button onclick="setFilter('Todos')" class="pb-2 transition-all text-sm ${currentFilter === 'Todos' ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}">Visión General</button>`;
            
            contexts.forEach(ctx => {
                const isActive = currentFilter === ctx.id;
                container.innerHTML += `<button onclick="setFilter('${ctx.id}')" class="pb-2 transition-all text-sm ${isActive ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}">${ctx.icon} ${ctx.name}</button>`;
            });
        }

        function renderContextButtons() {
            const container = document.getElementById('contextButtons');
            container.innerHTML = '';
            
            contexts.forEach(ctx => {
                const isSelected = selectedContext === ctx.id;
                const activeClasses = isSelected ? 'border-blue-500/50 bg-blue-500/20 text-blue-300' : 'border-gray-700 text-gray-400 opacity-60 hover:opacity-100';
                container.innerHTML += `<button onclick="setContext('${ctx.id}')" class="px-3 py-1.5 rounded-xl border ${activeClasses} text-sm transition-all flex items-center gap-1">${ctx.icon} ${ctx.name}</button>`;
            });

            container.innerHTML += `<button onclick="addNewContext()" class="px-3 py-1.5 rounded-xl border border-dashed border-gray-600 text-gray-500 text-sm hover:border-blue-400 hover:text-blue-400 transition-all flex items-center">+ Nuevo</button>`;
        }

        function setContext(id) {
            selectedContext = id;
            renderContextButtons();
        }

        function addNewContext() {
            const name = prompt("¿Cómo se llamará el nuevo apartado?");
            if (!name || name.trim() === "") return;
            const icon = prompt("Escribe un emoji para identificarlo:") || "📌";
            const newId = name.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            contexts.push({ id: newId, name: name.trim(), icon: icon.trim() });
            localStorage.setItem('contexts_v1', JSON.stringify(contexts));
            setContext(newId);
            renderTabs();
        }

        function renderTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '';
            let filtered = tasks.filter(t => currentFilter === 'Todos' || t.contextId === currentFilter);
            const today = new Date().toISOString().split('T')[0];

            filtered.forEach((t) => {
                const globalIndex = tasks.indexOf(t);
                const mins = Math.floor(t.timeLeft / 60);
                const secs = t.timeLeft % 60;
                const taskContext = contexts.find(c => c.id === t.contextId) || { name: 'Desconocido', icon: '❓' };
                
                let dateBadge = '';
                if (t.date) {
                    const isOverdueOrToday = t.date <= today;
                    const badgeColor = isOverdueOrToday ? 'bg-red-500/20 text-red-400 border-red-500/30' : 'bg-gray-800 text-gray-400 border-gray-700';
                    const icon = isOverdueOrToday ? '⚠️' : '📅';
                    dateBadge = `<span class="text-[10px] px-2 py-0.5 rounded-md border ${badgeColor} flex items-center gap-1">${icon} ${t.date}</span>`;
                }

                const div = document.createElement('div');
                div.className = "glass-card p-5 rounded-2xl flex flex-col gap-4 animate__animated animate__fadeIn";
                div.innerHTML = `
                    <div class="flex justify-between items-start gap-3">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1.5">
                                <span class="text-xs opacity-80">${taskContext.icon} <span class="text-[10px] uppercase text-gray-400">${taskContext.name}</span></span>
                                ${dateBadge}
                            </div>
                            <p class="text-base font-medium leading-snug text-gray-100">${t.text}</p>
                        </div>
                        <div class="text-right shrink-0">
                            <p class="text-2xl font-mono ${t.isRunning ? 'timer-active' : 'text-gray-500'}">${mins}:${secs < 10 ? '0' : ''}${secs}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-1">
                        <button onclick="toggleTimer(${globalIndex})" class="flex-1 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 transition-colors text-xs font-semibold tracking-wide text-gray-300">
                            ${t.isRunning ? '⏸ PAUSAR' : '▶ ENFOCAR'}
                        </button>
                        <button onclick="completeTask(${globalIndex})" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-blue-600 to-indigo-600 text-xs font-bold text-white shadow-lg transition-transform active:scale-95">HECHO ✓</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            const timeInput = document.getElementById('taskTime');
            const dateInput = document.getElementById('taskDate');
            let mins = parseInt(timeInput.value) || 25;
            if (mins > 120) mins = 120;
            if (input.value.trim() === '') return;

            tasks.push({ text: input.value, contextId: selectedContext, timeLeft: mins * 60, isRunning: false, date: dateInput.value || null });
            saveAndRender();
            input.value = '';
            dateInput.value = '';
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderTabs();
            renderTasks();
        }

        function toggleTimer(index) {
            tasks.forEach((t, i) => { if(i !== index) t.isRunning = false; });
            tasks[index].isRunning = !tasks[index].isRunning;
            clearInterval(interval);
            if (tasks[index].isRunning) {
                interval = setInterval(() => {
                    if (tasks[index].timeLeft > 0) {
                        tasks[index].timeLeft--;
                        saveAndRender();
                    } else {
                        clearInterval(interval);
                        tasks[index].isRunning = false;
                        saveAndRender();
                    }
                }, 1000);
            }
            saveAndRender();
        }

        function completeTask(index) {
            tasks.splice(index, 1);
            clearInterval(interval);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('tasks_v6', JSON.stringify(tasks));
            renderTasks();
        }

        if(localStorage.getItem('focus_user_logged') === 'true') {
            renderTabs();
            renderContextButtons();
            renderTasks();
        }
    </script>
</body>
</html>
